<!DOCTYPE html>
<!--
  SpecCopilot — a working AI tool that turns a one-line feature idea into a structured PRD.
  Built by Vimal Ajit as a working demo for the Razorpay Full-Stack AI PM role.

  HOW IT WORKS
  - Demo mode (default): with no API key set, "Generate" returns a real pre-written PRD instantly,
    so anyone opening the link sees polished, functional output.
  - Live mode: click the key icon (top-right), paste your own Anthropic API key, and it generates
    live via the Claude API. Your key is stored ONLY in your browser (localStorage) — it is never
    committed to this file or sent anywhere except api.anthropic.com.

  SECURITY: Do NOT hardcode an API key into this file and push it to a public repo — anyone could
  read it from the page source and drain your account. The bring-your-own-key model below avoids that.

  DEPLOY (GitHub Pages):
    1. Create a public repo, e.g. "spec-copilot".
    2. Drop this file in as index.html and push.
    3. Repo → Settings → Pages → Source: "Deploy from a branch" → main / root → Save.
    4. Live in ~1 min at https://<your-username>.github.io/spec-copilot/
  Works on Vercel/Netlify identically (just drag the folder in).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpecCopilot — idea → PRD</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --accent:#0B5CFF; --ink:#0A1B3D; --slate:#5A6A85; --line:#E3E9F2; --paper:#FBFCFE; --muted:#93A1B8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);}
  body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .sans{font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;}
  .btn{transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;}
  .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 22px rgba(11,92,255,.28);}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .chip{transition:background .12s,border-color .12s,color .12s;cursor:pointer;}
  .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .card{animation:fade .5s ease both;}
  .sec{animation:fade .45s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  textarea:focus,input:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(11,92,255,.12);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{animation:spin .8s linear infinite;}
  .bar{animation:grow 1.1s ease both;transform-origin:left;}
  @keyframes grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  .icon-btn{transition:background .12s,border-color .12s;cursor:pointer;}
  .icon-btn:hover{background:#EEF3FC;border-color:var(--accent);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const ACCENT="#0B5CFF", INK="#0A1B3D", SLATE="#5A6A85", LINE="#E3E9F2", PAPER="#FBFCFE";
const MODEL = "claude-sonnet-4-6";
const KEY_STORE = "speccopilot_anthropic_key";

const EXAMPLES = [
  { label:"Duplicate-payout alerts", text:"An alert on the payouts dashboard that flags likely duplicate vendor payments before they're released, so finance ops can review them in one click." },
  { label:"PRD-from-Slack agent", text:"An internal agent that watches a Slack channel for feature requests and auto-drafts a structured PRD, then posts it back for the PM to refine." },
  { label:"Reconciliation copilot", text:"A tool that reconciles settlement files against the ledger, surfaces only the mismatches, and suggests the most likely root cause for each." },
];

// Pre-written PRD shown in demo mode (no key). Keeps a cold visitor's first impression strong.
const DEMO_PRD = {
  title: "Duplicate Payout Guard",
  problem: "Vendor payouts are released in high-volume batches, and duplicates slip through when the same invoice is submitted twice or a retry fires after a silent success. Each duplicate is real money out the door and a manual clawback. Finance ops currently catch these only after settlement, if at all.",
  objective: "Cut released duplicate payouts to near-zero by surfacing high-risk matches for one-click review before funds leave the account.",
  users: "Finance-ops analysts who approve payout batches, and the payments PM who owns payout integrity. Their job-to-be-done is releasing batches fast without letting a duplicate through.",
  userStories: [
    "As a finance-ops analyst, I want likely duplicates flagged before I approve a batch, so that I can hold them without delaying the rest.",
    "As an analyst, I want to see why each item was flagged (same invoice ID, same payee+amount within N days), so that I can decide in seconds.",
    "As a payments PM, I want a weekly view of caught vs. missed duplicates, so that I can tune the matching rules.",
    "As an analyst, I want to release the clean items in one action, so that the alert never becomes a bottleneck."
  ],
  acceptanceCriteria: [
    "Flagged items appear inline on the payout dashboard before batch release, not after.",
    "Each flag shows the match reason and the conflicting prior transaction.",
    "Analyst can approve, hold, or dismiss a flag in a single click, with an audit log entry.",
    "False-positive rate stays under 5% on a 30-day backtest before rollout.",
    "Clean (unflagged) items in a batch can be released without touching the held items."
  ],
  successMetrics: [
    "Released duplicate payouts reduced by 95%+ within one quarter.",
    "Median analyst review time per flag under 20 seconds.",
    "False-positive rate under 5%.",
    "Zero increase in batch-release TAT vs. baseline."
  ],
  risks: [
    "Over-aggressive matching could hold legitimate repeat payments (e.g. monthly retainers) — needs a payee-level allowlist.",
    "Root-cause attribution depends on clean payee-master data; upstream inconsistencies may weaken matches.",
    "Open question: block-and-hold vs. warn-only as the default — depends on analyst trust during rollout."
  ],
  rice: { reach:7, impact:9, confidence:8, effort:4, rationale:"High-impact money-loss problem with a focused surface; effort is moderate because the matching logic sits on data the ledger already has." }
};

const SECTIONS = [
  { key:"problem", label:"Problem" },
  { key:"objective", label:"Objective" },
  { key:"users", label:"Target Users" },
  { key:"userStories", label:"User Stories", list:true },
  { key:"acceptanceCriteria", label:"Acceptance Criteria", list:true },
  { key:"successMetrics", label:"Success Metrics", list:true },
  { key:"risks", label:"Risks & Open Questions", list:true },
];

function App(){
  const [idea,setIdea]=useState("");
  const [context,setContext]=useState("Internal tooling · Payments / Fintech");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [prd,setPrd]=useState(null);
  const [isDemo,setIsDemo]=useState(false);
  const [keyOpen,setKeyOpen]=useState(false);
  const [apiKey,setApiKey]=useState(()=>{ try{return localStorage.getItem(KEY_STORE)||"";}catch(e){return "";} });
  const [copied,setCopied]=useState(false);
  const outRef=useRef(null);

  function saveKey(v){ setApiKey(v); try{ v?localStorage.setItem(KEY_STORE,v):localStorage.removeItem(KEY_STORE); }catch(e){} }

  function prdToMarkdown(p){
    const r=p.rice;
    const score = r ? Math.round((r.reach*r.impact*r.confidence)/Math.max(r.effort,1)) : null;
    const L=[];
    L.push(`# ${p.title}`,"");
    if(score!=null) L.push(`**RICE Score:** ${score}`,"");
    if(p.problem) L.push(`## Problem`,p.problem,"");
    if(p.objective) L.push(`## Objective`,p.objective,"");
    if(p.users) L.push(`## Target Users`,p.users,"");
    if(p.userStories){ L.push(`## User Stories`); p.userStories.forEach((s,i)=>L.push(`${i+1}. ${s}`)); L.push(""); }
    if(p.acceptanceCriteria){ L.push(`## Acceptance Criteria`); p.acceptanceCriteria.forEach(c=>L.push(`- ${c}`)); L.push(""); }
    if(p.successMetrics){ L.push(`## Success Metrics`); p.successMetrics.forEach(m=>L.push(`- ${m}`)); L.push(""); }
    if(p.risks){ L.push(`## Risks & Open Questions`); p.risks.forEach(x=>L.push(`- ${x}`)); L.push(""); }
    if(r){
      L.push(`## RICE Breakdown`);
      L.push(`- **Reach:** ${r.reach}/10`,`- **Impact:** ${r.impact}/10`,`- **Confidence:** ${r.confidence}/10`,`- **Effort:** ${r.effort}/10`,"");
      if(r.rationale) L.push(`_${r.rationale}_`,"");
    }
    L.push(`---`,`Drafted by SpecCopilot`);
    return L.join("\n");
  }

  function copyMd(){
    const md=prdToMarkdown(prd);
    const done=()=>{ setCopied(true); setTimeout(()=>setCopied(false),1800); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(md).then(done).catch(()=>fallbackCopy(md,done));
    } else { fallbackCopy(md,done); }
  }
  function fallbackCopy(text,done){
    const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){} document.body.removeChild(ta);
  }
  function downloadMd(){
    const md=prdToMarkdown(prd);
    const slug=(prd.title||"prd").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,50)||"prd";
    const blob=new Blob([md],{type:"text/markdown"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`${slug}.md`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  async function generate(){
    if(!idea.trim()||loading) return;
    setLoading(true); setError(""); setPrd(null); setIsDemo(false); setCopied(false);

    // Demo mode: no key → return the pre-written PRD after a short, believable delay.
    if(!apiKey.trim()){
      await new Promise(r=>setTimeout(r,900));
      setPrd(DEMO_PRD); setIsDemo(true); setLoading(false);
      setTimeout(()=>outRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80);
      return;
    }

    const prompt = `You are an expert senior product manager at a fintech company. Turn the rough feature idea below into a crisp, structured PRD. Be concrete and opinionated — make reasonable assumptions rather than hedging.

Product context: ${context}
Feature idea: "${idea.trim()}"

Respond with ONLY a valid JSON object (no markdown, no backticks, no preamble) in exactly this shape:
{
  "title": "a short, sharp product name for this feature",
  "problem": "2-3 sentences on the problem and why it matters now",
  "objective": "1-2 sentences on the measurable outcome",
  "users": "1-2 sentences naming the primary users and their job-to-be-done",
  "userStories": ["3-4 user stories in 'As a X, I want Y, so that Z' form"],
  "acceptanceCriteria": ["4-5 specific, testable acceptance criteria"],
  "successMetrics": ["3-4 quantifiable success metrics"],
  "risks": ["3 key risks or open questions worth flagging"],
  "rice": { "reach": <1-10>, "impact": <1-10>, "confidence": <1-10>, "effort": <1-10>, "rationale": "one sentence justifying the scores" }
}`;

    try{
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "content-type":"application/json",
          "x-api-key":apiKey.trim(),
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({ model:MODEL, max_tokens:1500, messages:[{role:"user",content:prompt}] })
      });
      if(!res.ok){
        const t = await res.text();
        throw new Error(res.status===401?"Invalid API key — check it and try again.":("API error "+res.status+": "+t.slice(0,160)));
      }
      const data = await res.json();
      const raw = data.content.filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
      setPrd(JSON.parse(raw));
      setTimeout(()=>outRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80);
    }catch(e){
      setError(e.message||"Couldn't generate the PRD. Try again or rephrase the idea.");
    }finally{ setLoading(false); }
  }

  const rice = prd?.rice ? (((prd.rice.reach*prd.rice.impact*prd.rice.confidence)/Math.max(prd.rice.effort,1))).toFixed(0) : null;

  return (
    <div style={{minHeight:"100vh",background:PAPER}}>
      <div style={{maxWidth:880,margin:"0 auto",padding:"44px 28px 80px"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
              <div style={{width:34,height:34,borderRadius:9,background:ACCENT,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 16px rgba(11,92,255,.32)"}}>
                <span className="sans" style={{color:"#fff",fontWeight:800,fontSize:17}}>S</span>
              </div>
              <div className="sans" style={{fontWeight:800,fontSize:19,letterSpacing:"-.01em"}}>Spec<span style={{color:ACCENT}}>Copilot</span></div>
            </div>
          </div>
          <button className="sans icon-btn" onClick={()=>setKeyOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:7,border:`1px solid ${apiKey?ACCENT:LINE}`,background:apiKey?"#EEF3FC":"#fff",color:apiKey?ACCENT:SLATE,borderRadius:9,padding:"7px 12px",fontSize:12.5,fontWeight:600}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:apiKey?"#19B36B":"#C7D0DE",display:"inline-block"}}></span>
            {apiKey?"Live mode":"Demo mode"}
          </button>
        </div>
        <p className="sans" style={{color:SLATE,fontSize:14.5,margin:"0 0 4px",lineHeight:1.5}}>Turn a one-line feature idea into a structured PRD — problem, stories, acceptance criteria, metrics, and a RICE score.</p>
        <p className="sans" style={{color:"#93A1B8",fontSize:12.5,margin:"0 0 22px"}}>A working demo by Vimal Ajit · live Claude API · the kind of internal tool that multiplies a PM team</p>

        {/* Key panel */}
        {keyOpen && (
          <div className="card sans" style={{background:"#fff",border:`1px solid ${LINE}`,borderRadius:13,padding:16,marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:12.5,marginBottom:7,color:INK}}>Anthropic API key (optional)</div>
            <p style={{margin:"0 0 10px",fontSize:12.5,color:SLATE,lineHeight:1.5}}>Leave blank to see a demo result. Paste a key to generate live. Stored only in this browser — never uploaded, never in the page source.</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input type="password" value={apiKey} onChange={e=>saveKey(e.target.value)} placeholder="sk-ant-..."
                style={{flex:"1 1 280px",border:`1px solid ${LINE}`,borderRadius:9,padding:"10px 13px",fontSize:13,color:INK,background:PAPER,fontFamily:"monospace"}}/>
              {apiKey && <button className="sans" onClick={()=>saveKey("")} style={{border:`1px solid ${LINE}`,background:"#fff",color:SLATE,borderRadius:9,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Clear</button>}
            </div>
            <p style={{margin:"10px 0 0",fontSize:11.5,color:"#A9B5C9"}}>Get a key at console.anthropic.com → API Keys. Set a low monthly spend cap for peace of mind.</p>
          </div>
        )}

        {/* Input card */}
        <div style={{background:"#fff",border:`1px solid ${LINE}`,borderRadius:16,padding:22,boxShadow:"0 1px 2px rgba(10,27,61,.04)"}}>
          <label className="sans" style={{display:"block",fontWeight:700,fontSize:12.5,textTransform:"uppercase",letterSpacing:".06em",color:SLATE,marginBottom:9}}>Feature idea</label>
          <textarea value={idea} onChange={e=>setIdea(e.target.value)} rows={3} className="sans"
            placeholder="e.g. An alert that flags likely duplicate vendor payments before they're released…"
            style={{width:"100%",border:`1px solid ${LINE}`,borderRadius:11,padding:"13px 15px",fontSize:15,color:INK,resize:"vertical",lineHeight:1.55,background:PAPER}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12,marginBottom:16}}>
            <span className="sans" style={{fontSize:12,color:"#93A1B8",alignSelf:"center",marginRight:2}}>Try:</span>
            {EXAMPLES.map(ex=>(
              <button key={ex.label} onClick={()=>setIdea(ex.text)} className="sans chip"
                style={{fontSize:12.5,border:`1px solid ${LINE}`,background:"#fff",color:SLATE,borderRadius:999,padding:"6px 13px",fontWeight:600}}>{ex.label}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            <input value={context} onChange={e=>setContext(e.target.value)} className="sans"
              style={{flex:"1 1 260px",border:`1px solid ${LINE}`,borderRadius:10,padding:"11px 14px",fontSize:13.5,color:SLATE,background:PAPER}}/>
            <button onClick={generate} disabled={loading||!idea.trim()} className="sans btn"
              style={{background:ACCENT,color:"#fff",border:"none",borderRadius:10,padding:"12px 26px",fontSize:14.5,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:9}}>
              {loading ? (<><span className="spin" style={{width:15,height:15,border:"2px solid rgba(255,255,255,.45)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block"}}></span>Drafting…</>) : (<>Generate PRD →</>)}
            </button>
          </div>
        </div>

        {error && <div className="sans" style={{marginTop:16,padding:"13px 16px",background:"#FFF4F4",border:"1px solid #F6CCCC",borderRadius:11,color:"#B23B3B",fontSize:13.5}}>{error}</div>}

        {/* Output */}
        {prd && (
          <div ref={outRef} className="card" style={{marginTop:26}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}}>
              <div>
                {isDemo && <span className="sans" style={{display:"inline-block",padding:"5px 11px",background:"#FFF7E8",border:"1px solid #F2D89B",borderRadius:999,color:"#9A6B16",fontSize:11.5,fontWeight:600}}>Demo result · add your API key for live generation</span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={copyMd} className="sans icon-btn" style={{display:"flex",alignItems:"center",gap:6,border:`1px solid ${copied?"#19B36B":LINE}`,background:copied?"#EAF8F0":"#fff",color:copied?"#0E7A47":SLATE,borderRadius:9,padding:"7px 14px",fontSize:12.5,fontWeight:600,cursor:"pointer"}}>{copied?"Copied \u2713":"Copy Markdown"}</button>
                <button onClick={downloadMd} className="sans icon-btn" style={{display:"flex",alignItems:"center",gap:6,border:`1px solid ${LINE}`,background:"#fff",color:SLATE,borderRadius:9,padding:"7px 14px",fontSize:12.5,fontWeight:600,cursor:"pointer"}}>{"\u2193"} Download .md</button>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12,marginBottom:18}}>
              <div>
                <div className="sans" style={{fontSize:11.5,textTransform:"uppercase",letterSpacing:".08em",color:"#93A1B8",fontWeight:700,marginBottom:4}}>Generated PRD</div>
                <h2 style={{margin:0,fontSize:27,lineHeight:1.15,color:INK,fontWeight:700}}>{prd.title}</h2>
              </div>
              {rice && <div style={{textAlign:"center",background:INK,borderRadius:13,padding:"11px 18px",minWidth:96}}>
                <div className="sans" style={{color:"#8FB0FF",fontSize:10.5,textTransform:"uppercase",letterSpacing:".07em",fontWeight:700}}>RICE</div>
                <div className="sans" style={{color:"#fff",fontSize:25,fontWeight:800,lineHeight:1.1}}>{rice}</div>
              </div>}
            </div>

            {SECTIONS.map((s,i)=> prd[s.key]==null ? null : (
              <div key={s.key} className="sec" style={{animationDelay:`${i*0.06}s`,padding:"16px 0",borderTop:`1px solid ${LINE}`}}>
                <div className="sans" style={{fontSize:12,textTransform:"uppercase",letterSpacing:".06em",color:ACCENT,fontWeight:700,marginBottom:8}}>{s.label}</div>
                {s.list ? (
                  <ul style={{margin:0,paddingLeft:0,listStyle:"none"}}>
                    {prd[s.key].map((item,j)=>(
                      <li key={j} style={{display:"flex",gap:11,fontSize:15.5,lineHeight:1.6,color:"#27364F",marginBottom:8}}>
                        <span className="sans" style={{color:ACCENT,fontWeight:800,flexShrink:0,fontSize:13}}>{String(j+1).padStart(2,"0")}</span>
                        <span>{item}</span>
                      </li>
                    ))}
                  </ul>
                ) : <p style={{margin:0,fontSize:15.5,lineHeight:1.65,color:"#27364F"}}>{prd[s.key]}</p>}
              </div>
            ))}

            {prd.rice && (
              <div className="sec" style={{padding:"16px 0",borderTop:`1px solid ${LINE}`}}>
                <div className="sans" style={{fontSize:12,textTransform:"uppercase",letterSpacing:".06em",color:ACCENT,fontWeight:700,marginBottom:12}}>RICE Breakdown</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:18,marginBottom:12}}>
                  {[["Reach",prd.rice.reach],["Impact",prd.rice.impact],["Confidence",prd.rice.confidence],["Effort",prd.rice.effort]].map(([label,val],k)=>(
                    <div key={label} style={{flex:"1 1 120px",minWidth:110}}>
                      <div className="sans" style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:SLATE,marginBottom:6,fontWeight:600}}>
                        <span>{label}</span><span style={{color:INK}}>{val}/10</span>
                      </div>
                      <div style={{height:6,background:LINE,borderRadius:99,overflow:"hidden"}}>
                        <div className="bar" style={{height:"100%",width:`${val*10}%`,background:label==="Effort"?"#E0894A":ACCENT,borderRadius:99,animationDelay:`${k*0.08}s`}}></div>
                      </div>
                    </div>
                  ))}
                </div>
                <p className="sans" style={{margin:0,fontSize:13,color:SLATE,fontStyle:"italic",lineHeight:1.55}}>{prd.rice.rationale}</p>
              </div>
            )}

            <p className="sans" style={{marginTop:22,fontSize:11.5,color:"#A9B5C9",textAlign:"center"}}>Drafted by SpecCopilot in one pass. A PM refines from here — the blank-page tax is gone.</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
